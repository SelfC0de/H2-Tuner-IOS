name: Build H2 Tuner

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build xray for iOS arm64
        run: |
          git clone --depth=1 --branch v26.3.27 https://github.com/XTLS/Xray-core.git xray-src
          cd xray-src
          CGO_ENABLED=0 GOOS=ios GOARCH=arm64 go build -o ../xray_bin -trimpath -ldflags="-s -w" ./main
          cd ..
          cp xray_bin "H2 Tuner/xray"
          chmod +x "H2 Tuner/xray"
          echo "xray built: $(file H2\ Tuner/xray)"

      - name: Build app (no signing)
        run: |
          xcodebuild \
            -project "H2 Tuner.xcodeproj" \
            -scheme "H2 Tuner" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER=dev.selfcode.h2tuner \
            -derivedDataPath build \
            build

      - name: Package IPA
        run: |
          APP=$(find build -name "H2 Tuner.app" | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r H2Tuner.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: H2Tuner-${{ github.run_number }}
          path: H2Tuner.ipa
          retention-days: 30
