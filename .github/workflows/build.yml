name: Build H2 Tuner

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s /Applications/$XCODE/Contents/Developer
          xcodebuild -version

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build xray for iOS arm64
        run: |
          git clone --depth=1 --branch v26.3.27 https://github.com/XTLS/Xray-core.git xray-src
          cd xray-src
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          CC=$(xcrun --sdk iphoneos --find clang)
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            CGO_CFLAGS="-isysroot $SDK_PATH -arch arm64 -miphoneos-version-min=17.0" \
            CGO_LDFLAGS="-isysroot $SDK_PATH -arch arm64 -miphoneos-version-min=17.0" \
            CC="$CC" \
            go build -o ../xray_bin -trimpath -ldflags="-s -w" ./main
          cd ..
          cp xray_bin "H2 Tuner/xray"
          chmod +x "H2 Tuner/xray"
          file "H2 Tuner/xray"

      - name: Build app (no signing)
        run: |
          xcodebuild \
            -project "H2 Tuner.xcodeproj" \
            -scheme "H2 Tuner" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER=dev.selfcode.h2tuner \
            -derivedDataPath build \
            build

      - name: Package IPA
        run: |
          APP=$(find build -name "H2 Tuner.app" | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r H2Tuner.ipa Payload/

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pre-${{ github.run_number }}
          name: "H2 Tuner pre-release #${{ github.run_number }}"
          prerelease: true
          files: H2Tuner.ipa
          body: |
            🚧 Pre-release build #${{ github.run_number }}
            
            - Xray-core v26.3.27
            - Протоколы: VLESS · VMess · Trojan · Shadowsocks · Hysteria2
            - Установка через Sideloadly
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
