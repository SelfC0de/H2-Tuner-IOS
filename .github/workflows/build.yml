name: Build H2 Tuner

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s /Applications/$XCODE/Contents/Developer
          xcodebuild -version

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build LibXray.xcframework
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init
          mkdir xray_build && cd xray_build
          git clone --depth=1 https://github.com/XTLS/libXray.git
          git clone --depth=1 https://github.com/XTLS/Xray-core.git
          cd libXray
          python3 build/main.py apple gomobile
          XCFW=$(find . -name "LibXray.xcframework" | head -1)
          cp -r "$XCFW" "../../H2 Tuner/LibXray.xcframework"

      - name: Dump LibXray symbols
        run: |
          echo "=== ALL FILES ==="
          find "H2 Tuner/LibXray.xcframework" -type f
          echo ""
          echo "=== HEADERS ==="
          find "H2 Tuner/LibXray.xcframework" -name "*.h" -exec echo "--- {} ---" \; -exec cat {} \;
          echo ""
          echo "=== NM SYMBOLS ==="
          find "H2 Tuner/LibXray.xcframework" -type f | while read f; do
            OUT=$(nm "$f" 2>/dev/null | grep -iE "RunXray|StopXray|InitGC|OBJC_CLASS" || true)
            if [ -n "$OUT" ]; then echo "--- $f ---"; echo "$OUT"; fi
          done
          echo ""
          echo "=== STRINGS EXACT ==="
          find "H2 Tuner/LibXray.xcframework" -type f | while read f; do
            OUT=$(strings "$f" 2>/dev/null | grep -E "^(Libxray|LibXray|libxray)" | sort -u || true)
            if [ -n "$OUT" ]; then echo "--- $f ---"; echo "$OUT"; fi
          done

      - name: Patch pbxproj
        run: python3 patch_pbxproj.py

      - name: Build app
        run: |
          xcodebuild \
            -project "H2 Tuner.xcodeproj" \
            -scheme "H2 Tuner" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PRODUCT_BUNDLE_IDENTIFIER=dev.selfcode.h2tuner \
            SWIFT_OBJC_BRIDGING_HEADER="H2 Tuner/H2Tuner-Bridging-Header.h" \
            -derivedDataPath build \
            build

      - name: Package IPA
        run: |
          APP=$(find build -name "H2 Tuner.app" | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r H2Tuner.ipa Payload/

      - name: Create Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pre-${{ github.run_number }}
          name: "H2 Tuner pre-release #${{ github.run_number }}"
          prerelease: true
          files: H2Tuner.ipa
          body: "Pre-release build #${{ github.run_number }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
